<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>langoway.github.io</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1f6feb22;
      border: 1px solid #1f6feb55;
      color: #58a6ff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f0f6fc;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #8b949e;
      margin-bottom: 1.5rem;
    }

    .link-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.85rem;
      color: #58a6ff;
      word-break: break-all;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">GitHub Pages</span>
    <h1>langoway.github.io</h1>
    <p>
      This site hosts the <strong style="color:#e6edf3;">app-ads.txt</strong> file
      required for Google AdMob publisher verification.
    </p>
    <div class="link-box">
      https://langoway.github.io/app-ads/app-ads.txt
    </div>
  </div>
  <footer>Powered by GitHub Pages &mdash; static files only</footer>
</body>
</html>
